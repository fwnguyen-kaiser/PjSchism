name: DB Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'schism/db/**'
      - 'schism/persistence/**'
      - 'schism/api/schemas.py'
      - 'schism/tests/test_ingestion_integrity.py'
      - 'schism/tests/conftest.py'
      - 'requirements.txt'
      - '.github/workflows/ci-db.yml'
  pull_request:
    branches: [main]
    paths:
      - 'schism/db/**'
      - 'schism/persistence/**'
      - 'schism/api/schemas.py'
      - 'schism/tests/test_ingestion_integrity.py'
      - 'schism/tests/conftest.py'
      - 'requirements.txt'
      - '.github/workflows/ci-db.yml'

jobs:
  db-integration:
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: schism
          POSTGRES_USER: schism
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schism -d schism"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations
        env:
          PGPASSWORD: changeme
        run: |
          psql -h localhost -U schism -d schism -f schism/db/init.sql
          for f in $(ls schism/db/migrations/*.sql | sort); do
            echo "Applying $f"
            psql -h localhost -U schism -d schism -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run DB integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://schism:changeme@localhost:5432/schism?ssl=disable
        run: |
          pytest schism/tests/ -m integration -v --tb=short
