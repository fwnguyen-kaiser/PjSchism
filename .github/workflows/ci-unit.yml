name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'schism/**/*.py'
      - 'requirements.txt'
      - '.github/workflows/ci-unit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'schism/**/*.py'
      - 'requirements.txt'
      - '.github/workflows/ci-unit.yml'

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest schism/tests/ \
            -m "not integration" \
            --ignore=schism/tests/test_ingestion_real_data.py \
            -q --tb=short
