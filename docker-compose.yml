services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: schism_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: schism
      POSTGRES_USER: schism
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./schism/data/volumes/pgdata:/var/lib/postgresql/data
      - ./schism/db/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./schism/db/run_migrations.sh:/docker-entrypoint-initdb.d/01_run_migrations.sh
      - ./schism/db/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schism -d schism"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schism_redis
    restart: unless-stopped
    volumes:
      - ./schism/data/volumes/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: schism_ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://schism:${DB_PASSWORD}@db:5432/schism
      REDIS_URL: redis://redis:6379
      PARQUET_ROOT: /app/schism/data/volumes/parquet
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./schism/data/volumes/parquet:/app/schism/data/volumes/parquet
      - .:/app
    command: python -m schism.data.ingestion.ingestion_service

  model:
    build:
      context: .
      dockerfile: Dockerfile.model
    container_name: schism_model
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://schism:${DB_PASSWORD}@db:5432/schism
      REDIS_URL: redis://redis:6379
      PARQUET_ROOT: /app/schism/data/volumes/parquet
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./schism/data/volumes/checkpoints:/app/schism/data/volumes/checkpoints
      - ./schism/data/volumes/parquet:/app/schism/data/volumes/parquet
      - .:/app
    command: python -m schism.runtime.regime_engine

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: schism_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://schism:${DB_PASSWORD}@db:5432/schism
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn schism.main:app --host 0.0.0.0 --port 8000 --reload
